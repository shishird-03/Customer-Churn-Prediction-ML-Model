<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Predictor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f8f9fa; }
        .container { max-width: 450px; margin: 50px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #343a40; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #495057; }
        input[type="number"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ced4da; border-radius: 4px; font-size: 16px; }
        input[type="number"]:focus { outline: none; border-color: #80bdff; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: #0056b3; }
        .result { margin-top: 25px; padding: 15px; border-radius: 4px; font-size: 18px; font-weight: bold; text-align: center; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Churn Predictor</h2>
        <form action="/predict" method="post">
            <div class="form-group">
                <label for="tenure">Tenure (months):</label>
                <input type="number" id="tenure" name="tenure" required value="{{ request.form.get('tenure', '') }}" placeholder="Enter tenure" min="0" oninput="calculateTotal()">
            </div>
            
            <div class="form-group">
                <label for="MonthlyCharges">Monthly Charges ($):</label>
                <input type="number" id="MonthlyCharges" name="MonthlyCharges" required value="{{ request.form.get('MonthlyCharges', '') }}" placeholder="Enter monthly charges" step="0.1" min="0" oninput="calculateTotal()">
            </div>
            
            <div class="form-group">
                <label for="TotalCharges">Total Charges ($):</label>
                <input type="number" id="TotalCharges" name="TotalCharges" required value="{{ request.form.get('TotalCharges', '') }}" placeholder="Automatically calculated..." step="0.1" min="0" readonly style="background-color: #e9ecef; cursor: not-allowed;">
            </div>
            
            <button type="submit">Predict Churn</button>
        </form>
        
        <script>
            function calculateTotal() {
                var tenure = document.getElementById('tenure').value;
                var monthly = document.getElementById('MonthlyCharges').value;
                if (tenure && monthly) {
                    var total = parseFloat(tenure) * parseFloat(monthly);
                    // Update the Total Charges field, rounded to 2 decimal places
                    document.getElementById('TotalCharges').value = total.toFixed(2);
                } else {
                    document.getElementById('TotalCharges').value = "";
                }
            }
        </script>
        
        {% if prediction_text %}
            {% if 'Error' in prediction_text %}
                <div class="result error">{{ prediction_text }}</div>
            {% else %}
                <div class="result success">{{ prediction_text }}</div>
            {% endif %}
        {% endif %}
    </div>
</body>
</html>
