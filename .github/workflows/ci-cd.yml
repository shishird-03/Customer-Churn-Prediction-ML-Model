# GitHub Actions CI/CD Pipeline
name: ML Model Testing & Deployment

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v2
      with:
        python-version: 3.9
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Test Flask app
      run: |
        python -c "from app_enhanced import app; app.config['TESTING'] = True; print('✓ App loads successfully')"
    
    - name: Check model files
      run: |
        python -c "
        import pickle
        with open('model.pkl', 'rb') as f:
            model = pickle.load(f)
        with open('model_columns.pkl', 'rb') as f:
            cols = pickle.load(f)
        print(f'✓ Model loaded: {type(model).__name__}')
        print(f'✓ Features: {len(cols)} columns')
        "
    
    - name: Build Docker image
      run: |
        docker build -t churn-predictor:latest .
        docker run --rm churn-predictor:latest python -c "from app_enhanced import app; print('✓ Docker image built successfully')"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Deploy to production
      run: |
        echo "Deploy logic here (Heroku, AWS, GCP, etc.)"
        # Example: git push heroku main
